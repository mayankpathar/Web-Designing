<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <table>
            <caption>student Registration</caption>
            <br>
            <tr>
                <td><label for="fullname">fullname</label></td>
                <td><input type="text" name="user name" id="fullname"></td>
            </tr>
            <tr>
                <td><label for="email">Email</label></td>
                <td><input type="text" name="email" id="email"></td>
            </tr>
            <tr>
                <td><label for="mo">mobil no</label></td>
                <td><input type="text" name="mo" id="mo"></td>
            </tr>
            <tr>
                <td><label for="add">address</label></td>
                <td><textarea name="add" id="add"></textarea></td>
            </tr>
             <tr>
                <td><label for="na">nationality</label></td>
                <td><input type="text" name="na" id="na"></td>
            </tr>
             <tr>
                <td><label for="dob">date</label></td>
                <td><input type="date" name="dob" id="dob"></td>
            </tr>
             <tr>
                <td><label for="gen">gender</label></td>
               <td><input type="radio" name="gender" id="a">male
                <input type="radio" name="gender" id="b">female</td>
            </tr>
             <tr>
                <td><label for="Hd">Highest Degree</label></td>
                <td><select name="Degree" id="HD">
                    <option value="" defult required>b.com</option>
                    <option value="">m.sc</option>
                    <option value="">b.sc</option>
                    <option value="">b.tach</option>
                    <option value="">m.tach</option>
                </select></td>
            </tr>
            <tr>
            <td><label for="cpi">cpi</label></td>
            <td><input type="text" name="cpi" id="cpi"></td>
            </tr>
            <tr>
            <td><label for="university">University</label></td>
            <td><input type="text" name="university" id="university"></td>
            </tr>
            <tr>
                <td><label for="Hd">passing year</label></td>
                <td><select name="select" id="Hd">
                    <option value="" defult required>2020</option>
                    <option value="">2021</option>
                    <option value="">2022</option>
                    <option value="">2023</option>
                    <option value="">2024</option>
                </select></td></tr>
                <tr>
                    <td><input type="submit"></td>
                    <td><input type="reset" value="cancel"></td>
                </tr>
        </table>
    </form>
</body>
</html>
